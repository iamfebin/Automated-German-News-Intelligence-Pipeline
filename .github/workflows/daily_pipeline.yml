name: Daily German News Intelligence Pipeline

on:
  schedule:
    - cron: '0 6 * * *' # Every day at 6:00 AM UTC
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Cache Hugging Face models to speed up workflows
      - name: Cache Hugging Face Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-cache-${{ hashFiles('requirements_etl.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-cache-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_etl.txt

      - name: Run ETL Pipeline
        env:
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          HF_WRITE_TOKEN: ${{ secrets.HF_WRITE_TOKEN }}
          SCRAPER_LIMIT_PER_FEED: 10
        run: |
          python src/job_etl.py
